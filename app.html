    <!--
      Analytics: Cloudflare Web Analytics (cookieless, privacy-first).
      Replaces Google Analytics so the "no data collection" promise on the
      landing page is actually true — CF Web Analytics sets no cookies and

      EASIEST SETUP: Cloudflare Dashboard -> your Pages project -> Metrics ->
      enable "Web Analytics" (Cloudflare then injects the beacon automatically;
      keep the tag below commented out).
      MANUAL ALTERNATIVE: Dashboard -> Web Analytics -> Add site -> copy the
      token, paste it below and uncomment the tag.
    -->
    <!--
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "PASTE_YOUR_CF_ANALYTICS_TOKEN"}'
    ></script>
    -->
